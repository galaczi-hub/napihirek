name: 📰 Európai Hírlap – Napi küldés

on:
  schedule:
    - cron: '0 8 * * *'      # 08:00 UTC = 09:00 CET (téli idő szerint)
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python beállítás
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek telepítése
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Napi hírek küldése
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          # NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}   # már nem használjuk, ki lehet venni
        run: python daily_news.py
